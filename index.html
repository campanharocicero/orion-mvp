<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORION - Conselheiro Estratégico</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      position: relative;
    }

    /* HOME SCREEN */
    .home-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px 20px;
      text-align: center;
      animation: fadeIn 0.3s ease-out;
    }

    .home-screen.hidden { display: none; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .orion-logo {
      font-size: 32px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .orion-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 40px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .home-title {
      font-size: 24px;
      color: #1e293b;
      margin-bottom: 32px;
      font-weight: 600;
      line-height: 1.3;
      max-width: 280px;
    }

    .quick-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 280px;
    }

    .quick-btn {
      padding: 16px 20px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.1);
    }

    .quick-btn:active { transform: scale(0.98); box-shadow: 0 1px 4px rgba(15, 23, 42, 0.15); }
    .quick-btn:hover { box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15); }

    /* CHAT SCREEN */
    .chat-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f8fafc;
    }

    .chat-screen.hidden { display: none; }

    .chat-header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: 600;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .back-btn:active { background: rgba(255, 255, 255, 0.3); }

    /* MESSAGES */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-track { background: transparent; }
    .messages-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    .message {
      display: flex;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }

    .message-content {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 14px;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .message-content {
      background: white;
      color: #1e293b;
      border-bottom-left-radius: 4px;
      border: 1px solid #e2e8f0;
    }

    /* RESPONSE CONTENT */
    .response-summary {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      margin-top: 8px;
      font-size: 13px;
      color: #475569;
      line-height: 1.5;
      max-height: 160px;
      overflow: hidden;
      position: relative;
    }

    .response-summary::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(transparent, white);
      pointer-events: none;
    }

    .response-summary.expanded {
      max-height: none;
      overflow: visible;
    }

    .response-summary.expanded::after { display: none; }

    .expand-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 8px 12px;
      background: #f1f5f9;
      border: none;
      border-radius: 6px;
      color: #3b82f6;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .expand-btn:active { background: #e2e8f0; }
    .expand-btn.hidden { display: none; }

    /* LOADING */
    .loading {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
    }

    .loading-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #94a3b8;
      animation: bounce 1.4s infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-6px); }
    }

    /* INPUT */
    .input-container {
      padding: 12px 16px 16px;
      background: white;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0 12px;
      transition: all 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    input[type='text'] {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px 0;
      font-size: 14px;
      outline: none;
      color: #1e293b;
    }

    input[type='text']::placeholder { color: #94a3b8; }

    .send-btn {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:active:not(:disabled) { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* EMPTY STATE & ERROR */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #94a3b8;
      text-align: center;
      padding: 24px;
      gap: 12px;
      font-size: 13px;
    }

    .empty-state-icon { font-size: 40px; opacity: 0.6; }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      border-left: 3px solid #dc2626;
    }

    /* MOBILE */
    @media (max-width: 640px) {
      .orion-logo { font-size: 28px; }
      .home-title { font-size: 20px; margin-bottom: 28px; }
      .quick-actions { gap: 10px; }
      .quick-btn { padding: 14px 16px; font-size: 14px; }
      .message-content { max-width: 90%; font-size: 13px; }
      .input-container { padding: 10px 12px 14px; }
      .send-btn { padding: 9px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HOME -->
    <div class="home-screen" id="homeScreen">
      <div class="orion-logo">ORION</div>
      <div class="orion-subtitle">Strategic Advisor</div>
      <div class="home-title">O que você precisa resolver agora?</div>
      <div class="quick-actions">
        <button class="quick-btn" data-action="meeting">Reunião hoje</button>
        <button class="quick-btn" data-action="decision">Decisão agora</button>
        <button class="quick-btn" data-action="message">Mensagem delicada</button>
      </div>
    </div>

    <!-- CHAT -->
    <div class="chat-screen hidden" id="chatScreen">
      <div class="chat-header">
        <span>ORION</span>
        <button class="back-btn" id="backBtn">← Voltar</button>
      </div>
      <div class="messages-container" id="messagesContainer">
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <div>Inicie uma conversa</div>
        </div>
      </div>
      <div class="input-container">
        <div class="input-wrapper">
          <input type="text" id="messageInput" placeholder="Descreva situação, decisão ou reunião" autocomplete="off">
        </div>
        <button class="send-btn" id="sendBtn">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    const prompts = {
      meeting: 'Com quem é a reunião e o que está em jogo?',
      decision: 'Quais são as opções e qual risco preocupa mais?',
      message: 'Para quem é a mensagem e qual resultado você quer?',
    };

    const ui = {
      homeScreen: document.getElementById('homeScreen'),
      chatScreen: document.getElementById('chatScreen'),
      messagesContainer: document.getElementById('messagesContainer'),
      messageInput: document.getElementById('messageInput'),
      sendBtn: document.getElementById('sendBtn'),
      backBtn: document.getElementById('backBtn'),
    };

    let hasMessages = false;

    // Event listeners
    document.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', () => startChat(btn.dataset.action));
    });

    ui.sendBtn.addEventListener('click', sendMessage);
    ui.messageInput.addEventListener('keypress', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    ui.backBtn.addEventListener('click', resetChat);

    function startChat(action) {
      ui.homeScreen.classList.add('hidden');
      ui.chatScreen.classList.remove('hidden');
      ui.messageInput.value = prompts[action];
      ui.messageInput.focus();
    }

    function resetChat() {
      ui.homeScreen.classList.remove('hidden');
      ui.chatScreen.classList.add('hidden');
      ui.messagesContainer.innerHTML = '';
      ui.messageInput.value = '';
      hasMessages = false;
    }

    async function sendMessage() {
      const text = ui.messageInput.value.trim();
      if (!text) return;

      if (!hasMessages) {
        ui.messagesContainer.innerHTML = '';
        hasMessages = true;
      }

      addMessage(text, 'user');
      ui.messageInput.value = '';
      ui.sendBtn.disabled = true;

      showLoading();

      try {
        const res = await fetch('https://orion-mvp.onrender.com/webhook', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        removeLoading();

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        addMessage(data.reply || 'Resposta processada', 'assistant');
      } catch (err) {
        removeLoading();
        const msg = err.message.includes('Failed')
          ? 'Erro de conexão. Verifique sua internet.'
          : `Erro: ${err.message}`;
        addMessage(msg, 'error');
      } finally {
        ui.sendBtn.disabled = false;
        ui.messageInput.focus();
      }
    }

    function addMessage(text, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;

      if (type === 'error') {
        msg.innerHTML = `<div class="error-message">${text}</div>`;
      } else if (type === 'assistant') {
        msg.innerHTML = `<div class="message-content">
          <div class="response-summary">${text}</div>
          <button class="expand-btn">Ver análise completa</button>
        </div>`;

        const expandBtn = msg.querySelector('.expand-btn');
        expandBtn.addEventListener('click', () => {
          const summary = msg.querySelector('.response-summary');
          summary.classList.add('expanded');
          expandBtn.classList.add('hidden');
        });
      } else {
        msg.innerHTML = `<div class="message-content">${text}</div>`;
      }

      ui.messagesContainer.appendChild(msg);
      ui.messagesContainer.scrollTop = ui.messagesContainer.scrollHeight;
    }

    function showLoading() {
      const msg = document.createElement('div');
      msg.className = 'message assistant';
      msg.id = 'loading';
      msg.innerHTML = '<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
      ui.messagesContainer.appendChild(msg);
      ui.messagesContainer.scrollTop = ui.messagesContainer.scrollHeight;
    }

    function removeLoading() {
      document.getElementById('loading')?.remove();
    }
  </script>
</body>
</html>
